# Thin caller for CI - delegates to Workflows repo reusable workflows
# No local scripts required - all logic is centralized in iamkayleb/Workflows
#
# This workflow runs:
# - Python: Lint (Ruff), Format check (Black), Type checking (mypy), Tests (pytest)
# - Node: Lint (ESLint), Format check (Prettier), Type check (tsc), Build (next build)
#
# NOTE: Do NOT add a top-level 'permissions:' block here. It causes
# startup_failure when calling reusable workflows. The reusable workflow
# defines its own permissions.
#
# Copy this file to: .github/workflows/ci.yml
# Also copy: autofix-versions.env to .github/workflows/autofix-versions.env
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  python:
    name: Python CI
    uses: iamkayleb/Workflows/.github/workflows/reusable-10-ci-python.yml@main
    with:
      python-versions: '["3.11", "3.12"]'
      typecheck: true
      coverage: true
      coverage-min: '80'
    secrets: inherit

  node:
    name: Node CI
    uses: iamkayleb/Workflows/.github/workflows/reusable-11-ci-node.yml@main
    with:
      working-directory: web
      package-manager: pnpm
      tests: false
      coverage: false
    secrets: inherit
